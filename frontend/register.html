<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header><h2>Register</h2></header>

<div class="container">
    <div class="card">
        <h3>Create Account</h3>

        <input id ="name" placeholder="Full Name" />
        <input id ="email" placeholder="Email" />
        <input id="password" type="password" placeholder="Password" />

        <label>Role</label>
        <select id="role" onchange="toggleCatererFields()">
            <option value="USER">User</option>
            <option value="CATERER">Caterer</option>
        </select>

        <!-- Caterer-specific fields-->
        <div id="catererFields" style="display: none">
            <input id="vegType" placeholder="Veg Type(VEG /NON_VEG)" />
            <input id="capacity" type="number" placeholder="Max Capacity" />
        </div>

        <button onclick="register()">Register</button>
        <p id="error" class="error"></p>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/register.js"></script>


</body>
</html>
